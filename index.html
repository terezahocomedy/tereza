<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tereza Ho | Digital Card</title>
    
    <!-- This line pulls in the official social media logos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #333; 
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #ff4757;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        p.subtitle {
            color: #aaaaaa;
            font-size: 16px;
            margin-top: 8px;
            margin-bottom: 30px;
        }
        .link-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; /* Adds space between the logo and the text */
            padding: 16px;
            background-color: #1e1e1e;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid #333;
        }
        .btn-primary {
            background-color: #ff4757;
            border: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- This pulls the profile.jpg image you uploaded to GitHub -->
    <img src="Terezaprofile.jpg" alt="Tereza Ho" class="profile-pic">
    
    <h1>Tereza Ho (Ah Sa)</h1>
    <p class="subtitle">Stand-Up Comedian</p>

    <!-- Buttons section -->
    <div class="link-container">
        
        <!-- vCard Download Button -->
        <a href="Tereza.vcf" class="btn btn-primary"><i class="fa-solid fa-address-card"></i> Save Contact</a>
        
        <!-- Social Media Links (Replace the # with your actual links) -->
        <a href="#" class="btn"><i class="fa-brands fa-instagram"></i> Instagram</a>
        
        <a href="#" class="btn"><i class="fa-brands fa-youtube"></i> YouTube</a>
        
        <a href="#" class="btn"><i class="fa-brands fa-facebook-f"></i> Facebook</a>

    </div>

</body>
</html>
