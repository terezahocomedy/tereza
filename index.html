<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tereza Ho | Comedian Speaker AI Consultant</title>
    
    <!-- This pulls in the official logos for the buttons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f7f5f2; color: #222; text-align: center; }
        .card { max-width: 420px; margin: 0 auto; padding: 40px 25px; }
        
        /* Ensure the image fills the circular area without distortion */
        .photo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;    /* ensures the image fills the circle without squashing */
            display: block;
            margin: 0 auto 25px;
            background: linear-gradient(135deg,#ddd,#aaa);
        }
        
        h1 { font-size:32px; margin:10px 0; }
        .tagline { font-size:16px; line-height:1.7; color:#555; }
        .intro { margin:25px 0; line-height:1.7; font-size:15px; }
        .button { display:block; margin:14px 0; padding:15px; border-radius:30px; text-decoration:none; background:#222; color:white; font-size:16px; }
        .button:hover { opacity:0.85; }
        .quote { margin-top:35px; font-style:italic; color:#777; font-size:14px; }
        
        /* Adds a little breathing room between the logo and your text */
        .button i { margin-right: 8px; }
        
        /* Flashing animation for Save Contact button */
        @keyframes flash {
            0%, 100% { background:#1b4d1b; }
            50% { background:#2d7a2d; }
        }
        .button-flash { animation: flash 1.5s infinite; }
    </style>
</head>
<body>
<div class="card">

    <!-- Use the image file already in the repo; object-fit will crop it visually to a circle -->
    <img src="Terezaprofile.JPG" alt="Tereza Ho" class="photo">
    
    <h1>Tereza Ho</h1>
    <div class="tagline">🎤 Stand-up Comedian<br>🤖 AI Consultant<br>🎙 Speaker</div>

    <!-- I added spaces after the commas here so it reads better on screen -->
    <div class="intro">
        From hospitality technology to comedy stage, I transform life experiences into stories, and technology into possibilities.
    </div>

    <!-- Emojis replaced with official logos -->
    <a class="button button-flash" href="Tereza.vcf"><i class="fa-solid fa-address-card"></i> Save Contact</a>

    <a class="button" href="https://wa.me/85298460499"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>

    <a class="button" href="https://instagram.com/terezahocomedy"><i class="fa-brands fa-instagram"></i> Instagram</a>

    <a class="button" href="https://www.linkedin.com/in/terezaho"><i class="fa-brands fa-linkedin-in"></i> LinkedIn</a>

    <div class="quote">"Turning experience into stories, technology into possibilities."</div>

</div>
</body>
</html>
